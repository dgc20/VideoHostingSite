# Deploys the site to Azure App Service on every push to main.
#
# One-time setup (done for you by deploy/azure-setup.sh, or do it manually):
#   1. Actions variable  AZURE_WEBAPP_NAME            = your app's name
#   2. Actions secret     AZURE_WEBAPP_PUBLISH_PROFILE = the app's publish profile XML
#        az webapp deployment list-publishing-profiles \
#          --name <app-name> --resource-group <app-name>-rg --xml
#
# Azure builds the app with Oryx using the web app's own Python 3.12 runtime
# (SCM_DO_BUILD_DURING_DEPLOYMENT=true is set by the setup script), so the
# deployed runtime always matches how the app was provisioned.
name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: azure-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.webapp-url }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Azure Web App
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
